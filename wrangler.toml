name = "crs-dispatch"
main = "server/src/worker.js"
compatibility_date = "2026-06-12"
# No nodejs_compat needed — Hono + your code are pure Web APIs.

[assets]
directory = "./web/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
# /internal/* added alongside /api/* for the new /internal/tv-notify route
# (server/src/tv.js) -- without it here, that path would fall through to the
# SPA asset fallback (a 200 serving index.html) instead of ever reaching the
# Worker's Hono app.
run_worker_first = ["/api/*", "/internal/*"]

[triggers]
crons = ["*/5 * * * *"]

# Holds a live WebSocket per connected /tv screen so job/assignment/request
# changes push an instant "refresh" instead of relying on the TV's own poll
# lag -- see server/src/tvChannel.js and notifyTv.js.
[[durable_objects.bindings]]
name = "TV_CHANNEL"
class_name = "TvChannel"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["TvChannel"]

[vars]
# Client-credentials token endpoint = your My Domain (prod), NOT test.salesforce.com.
SF_LOGIN_URL = "https://crsbuilding.my.salesforce.com"

# Hidden sentinel Opportunities (record IDs, not secrets). TIME_OFF_OPPORTUNITY_ID
# guards createAssignment() so approved time off can never rewrite the sentinel's
# Project_Status__c into a real board status. NEW_WO_OPPORTUNITY_ID marks a
# schedule request as "New WO Required" until the office re-points it at a real
# Opportunity. FS_Task_Id__c on both must remain null forever — see CLAUDE.md.
TIME_OFF_OPPORTUNITY_ID = "006Uh00000v6XJpIAM"
NEW_WO_OPPORTUNITY_ID   = "006Uh00000v5szqIAA"

# Public URL of the chalkboard app — magic links from POST /api/tech-link point here.
CHALKBOARD_APP_URL = "https://chalkboard.crsbas.workers.dev"

# Optional: second-layer token cache so cold isolates don't each re-auth.
[[kv_namespaces]]
binding = "SF_TOKENS"
id = "b9df8aade82f4f5c9b6f1b5c84f23eca"

[observability.logs]
enabled = false
invocation_logs = true

# Pushes a live "refresh" to a tech's open chalkboard tab the moment we save
# a change that affects them (approve/counter/deny, assignment
# create/edit/cancel) -- see notifyBoard.js and crs-board's CLAUDE.md "Live
# push to the tech app" section. Also requires a BOARD_NOTIFY_SECRET secret
# (wrangler secret put BOARD_NOTIFY_SECRET) matching chalkboard's own
# INTERNAL_NOTIFY_SECRET.
[[services]]
binding = "BOARD"
service = "chalkboard"